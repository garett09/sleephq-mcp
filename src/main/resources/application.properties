spring.application.name=sleephq-mcp
server.port=${SLEEPHQ_MCP_PORT:8080}

spring.ai.mcp.server.name=sleephq-mcp
spring.ai.mcp.server.version=1.0.0
spring.ai.mcp.server.protocol=STREAMABLE
spring.ai.mcp.server.type=SYNC
spring.ai.mcp.server.streamable-http.mcp-endpoint=/mcp
spring.ai.mcp.server.capabilities.tool=true
spring.ai.mcp.server.capabilities.resource=true
spring.ai.mcp.server.capabilities.prompt=true
spring.ai.mcp.server.instructions=SleepHQ MCP server: HTTP calls match https://sleephq.com/api/swagger.json only (base /api + paths /v1/...). Discover IDs with list-teams, list-machines, list-machine-dates. get-night-stats uses GET /api/v1/machine_dates/{id}. get-machine-date-by-date and get-combined-night-by-date use GET /api/v1/machines/{machine_id}/machine_dates/{date}. get-comparison aggregates those per calendar day in-process (no upstream /comparisons). Team lists: list-sleep-tests, list-journals, list-masks, list-devices, list-patients. Import/file tools: list-imports, get-import, list-import-files, list-files, get-import-file. get-waveform downloads and parses EDF device files (e.g. ResMed PLD.edf at 25 Hz) via the import files API — use list-files to find .edf file IDs, then get-waveform(fileId) for time-series channel data. Summary objects on machine_date (ahi_summary, pressure_summary, spo2_summary, etc.) remain the primary source for nightly aggregates.

spring.cache.type=caffeine
spring.cache.caffeine.spec=expireAfterWrite=6h,maximumSize=1000

management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=when_authorized

sleephq.base-url=https://sleephq.com
sleephq.client-id=${SLEEPHQ_CLIENT_ID:}
sleephq.client-secret=${SLEEPHQ_CLIENT_SECRET:}
sleephq.oauth-scope=${SLEEPHQ_OAUTH_SCOPE:read}

sleephq.mcp.api-key=${SLEEPHQ_MCP_API_KEY:}
sleephq.mcp.allow-anonymous=${SLEEPHQ_MCP_ALLOW_ANONYMOUS:false}
sleephq.clinical.default-team-id=${SLEEPHQ_TEAM_ID:}
sleephq.clinical.default-cpap-machine-id=${SLEEPHQ_CPAP_MACHINE_ID:}
sleephq.clinical.default-o2-machine-id=${SLEEPHQ_O2_MACHINE_ID:}
