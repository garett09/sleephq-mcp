spring.application.name=sleephq-mcp
server.port=${SLEEPHQ_MCP_PORT:8080}
# macOS + recent JDK: Tomcat SO_LINGER can throw SocketException: Invalid argument (harmless but noisy).
server.tomcat.socket.so-linger-on=false

spring.ai.mcp.server.name=sleephq-mcp
spring.ai.mcp.server.version=1.0.0
spring.ai.mcp.server.protocol=STREAMABLE
spring.ai.mcp.server.type=SYNC
spring.ai.mcp.server.streamable-http.mcp-endpoint=/mcp
spring.ai.mcp.server.capabilities.tool=true
spring.ai.mcp.server.capabilities.resource=true
spring.ai.mcp.server.capabilities.prompt=true
spring.ai.mcp.server.instructions=SleepHQ MCP server: HTTP calls match https://sleephq.com/api/swagger.json only (base /api + paths /v1/...). Discover IDs with list-teams, list-machines, list-machine-dates. get-night-stats and get-combined-night-by-date return { data: machine_date, journal?: wellness, night_analysis?: compact OSCAR fusion } with sleep_stages_summary (minutes_by_stage; stage_type 2=awake, 3=core, 4=deep, 5=rem). get-comparison nights[] include table_display (*_cell: ahi, leak, resp_rate, flow_limit, spo2, pulse, sleep, journal, settings). get-combined-night-by-date merges CPAP and O2 summaries (spo2_summary, pulse_rate_summary). night_analysis adds OSCAR PLD/EVE stats (tidal_volume, resp_rate, minute_vent, events, notable_moments) when OSCAR_DATA_PATH is set — use get-night-analysis for OSCAR-only. No tidal_volume in SleepHQ machine_date summaries. CPAP EDF: get-waveform (Flow, Press, Leak), get-device-events, scan-apnea-events. O2: get-o2-oximetry (SpO2+pulse_bpm; not sleep stages). Requires SLEEPHQ_TEAM_ID for journal overlay.

sleephq.fetch.parallelism=${SLEEPHQ_FETCH_PARALLELISM:8}

# MCP payload limits for LLM clients (large-context defaults ~500k–1M tokens).
sleephq.mcp.payload.waveform-default-max-minutes=${SLEEPHQ_MCP_WAVEFORM_DEFAULT_MAX_MINUTES:10}
sleephq.mcp.payload.waveform-max-minutes-cap=${SLEEPHQ_MCP_WAVEFORM_MAX_MINUTES_CAP:60}
sleephq.mcp.payload.waveform-max-samples-per-channel=${SLEEPHQ_MCP_WAVEFORM_MAX_SAMPLES:4000}
sleephq.mcp.payload.o2-recommended-max-minutes=${SLEEPHQ_MCP_O2_RECOMMENDED_MAX_MINUTES:45}
sleephq.mcp.payload.profile-note=${SLEEPHQ_MCP_PAYLOAD_NOTE:Large-context defaults — see get-comparison mcp_payload_hints.}

management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=when_authorized

sleephq.base-url=https://sleephq.com
sleephq.client-id=${SLEEPHQ_CLIENT_ID:}
sleephq.client-secret=${SLEEPHQ_CLIENT_SECRET:}
sleephq.oauth-scope=${SLEEPHQ_OAUTH_SCOPE:read}

sleephq.mcp.api-key=${SLEEPHQ_MCP_API_KEY:}
sleephq.mcp.allow-anonymous=${SLEEPHQ_MCP_ALLOW_ANONYMOUS:false}
sleephq.clinical.default-team-id=${SLEEPHQ_TEAM_ID:}
sleephq.clinical.default-cpap-machine-id=${SLEEPHQ_CPAP_MACHINE_ID:}
sleephq.clinical.default-o2-machine-id=${SLEEPHQ_O2_MACHINE_ID:}
# Fallback seconds for CPAP EDF drift when machine_date.time_offset is absent (primary source is SleepHQ API per night).
sleephq.clinical.cpap-clock-adjust-seconds=${SLEEPHQ_CPAP_CLOCK_ADJUST_SECONDS:0}

# Local OSCAR data (optional). When configured, get-combined-night-by-date attaches night_analysis.
oscar.data-path=${OSCAR_DATA_PATH:${user.home}/Documents/OSCAR_Data}
oscar.profile-name=${OSCAR_PROFILE_NAME:}
oscar.device-folder=${OSCAR_DEVICE_FOLDER:}
oscar.analysis.percentile=${OSCAR_ANALYSIS_PERCENTILE:95}
oscar.analysis.correlation-window-seconds=${OSCAR_CORRELATION_WINDOW_SECONDS:120}
oscar.analysis.max-notable-moments=${OSCAR_MAX_NOTABLE_MOMENTS:20}
oscar.analysis.max-timed-events=${OSCAR_MAX_TIMED_EVENTS:100}
oscar.analysis.max-nearby-events-per-moment=${OSCAR_MAX_NEARBY_EVENTS:5}

# Local SleepHQ mirror (ezscript/sleephq_download.py). Blank disables local-first reads.
sleephq.local.data-path=${SLEEPHQ_LOCAL_DATA_PATH:${user.home}/RESMED_DATA}
sleephq.local.o2-path=${SLEEPHQ_O2_LOCAL_PATH:${user.home}/SLEEPHQ_O2_RING}
# sync_report.json written by the downloader; used only for local-mirror freshness in provenance.
sleephq.local.sync-report-path=${SLEEPHQ_SYNC_REPORT_PATH:${user.home}/ezscript/sync_report.json}
